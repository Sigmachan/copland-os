---
stages: [checks, build]
variables:
  BUILD_HOST: builds.garudalinux.org
  BUILD_PORT: 220
  BUILD_USER: gitlab
check-lint:
  # Check the scripts and yaml files for common anti-patterns and issues
  stage: checks
  image: alpine:latest
  inherit:
    variables: false
  script:
    - apk add --no-cache --upgrade bash npm py3-pip shellcheck shfmt
    # Pass --break-system-packages since since this containers sole purpose is
    # running 2 applications. If we get to advance this, implement a proper venv
    - pip install --break-system-packages yamllint
    - npm install -g markdownlint-cli
    - bash .ci/lint.sh
  rules:
    - if: $MANUAL_BUILD == null
check-commitizen:
  # Check the current commit message for compliance with commitizen
  stage: checks
  image: nixpkgs/nix-flakes:latest
  variables:
    GIT_STRATEGY: none
  script: [nix run nixpkgs#commitizen -- check --message "$CI_COMMIT_TITLE"]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $MANUAL_BUILD == null
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $MANUAL_BUILD == null
build:
  # This only runs on the default branch and when the commit message contains [deploy *]
  # and is used to deploy the ISO to the build server.
  stage: build
  image: alpine:latest
  script:
    - '[[ -z ${DEPLOY_KEY+x} ]] && echo "No deploy key available, backing off!" &&
      exit 1'
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$DEPLOY_KEY" >>~/.ssh/id_ed25519
    - chmod 400 ~/.ssh/id_ed25519
    - apk add --no-cache --upgrade bash gawk openssh
    - bash .ci/what-to-build.sh
    - |
      ISO_FLAVOUR=$(awk -F ' ' '{ print $1 }' /tmp/TO_BUILD)
      KERNEL_FLAVOUR=$(awk -F ' ' '{ print $2 }' /tmp/TO_BUILD)
    - |
      if grep -q "buildall" /tmp/TO_BUILD; then
        ssh -p "$BUILD_PORT" -o StrictHostKeyChecking=no "$BUILD_USER"@"$BUILD_HOST" "ci-trigger buildall"
      elif grep -q "linux" /tmp/TO_BUILD; then
        ssh -p "$BUILD_PORT" -o StrictHostKeyChecking=no "$BUILD_USER"@"$BUILD_HOST" "ci-trigger $ISO_FLAVOUR $KERNEL_FLAVOUR"
      else
        ssh -p "$BUILD_PORT" -o StrictHostKeyChecking=no "$BUILD_USER"@"$BUILD_HOST" "ci-trigger $ISO_FLAVOUR"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_MESSAGE =~ /\[build.*\]/
    - if: $MANUAL_BUILD != null
