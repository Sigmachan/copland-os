# Hybrid graphics (X870E Hero): AMD Granite Ridge RDNA2 iGPU early KMS so the
# integrated GPU is brought up in the initramfs alongside the NVIDIA dGPU.
# The RTX 5090 (Blackwell) drives the primary display outputs; the iGPU provides
# a second render node for VA-API video offload, PRIME offload, and a backup
# display head. Pairs with /etc/modprobe.d/10-amdgpu-hybrid.conf and the
# prime-run / igpu-run helpers in /usr/local/bin.
force_drivers+=" amdgpu "
