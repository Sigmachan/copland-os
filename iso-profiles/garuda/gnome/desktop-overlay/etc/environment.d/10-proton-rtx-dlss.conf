# Bazzite-desktop parity: RTX/DLSS on by default, system-wide (desktop Steam AND Game Mode).
#
# RTX (DXR) + DX12 raytracing are ENABLED BY DEFAULT in modern Proton + vkd3d-proton (>=2.11) on
# nvidia-open — no env needed (so it's intentionally NOT set here). proton-cachyos/proton-ge ship
# vkd3d-proton (DX12) + DXVK-NVAPI (DLSS) already.
#
# These two turn on NVAPI (DLSS exposure) + the in-game DLSS auto-updater for EVERY Proton title,
# so DLSS works and pulls the latest model by default instead of only inside the gamescope session.
# Per-game "force newest DLSS preset / frame-gen" override: add `dlss-swapper %command%` to a game's
# Steam launch options (see /usr/local/bin/dlss-swapper).
PROTON_ENABLE_NVAPI=1
PROTON_ENABLE_NGX_UPDATER=1
