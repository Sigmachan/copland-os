# NVIDIA (RTX 5090 / nvidia-open) correctness for the gamescope Game Mode session.
# The upstream session is RADV(AMD)-tuned; these are the safe NVIDIA-on-Wayland envs.
# Hard requirement nvidia_drm.modeset=1 + nvidia_drm.fbdev=1 is set in the kernel cmdline (G004).
[Service]
# GBM allocation through the NVIDIA DRM backend (needed for KMS/Wayland on NVIDIA).
Environment=GBM_BACKEND=nvidia-drm
# Force the NVIDIA GLX vendor for Xwayland/GL clients inside gamescope.
Environment=__GLX_VENDOR_LIBRARY_NAME=nvidia
# DLSS / NVAPI for Proton titles launched from Steam Game Mode.
Environment=PROTON_ENABLE_NVAPI=1
Environment=PROTON_ENABLE_NGX_UPDATER=1
