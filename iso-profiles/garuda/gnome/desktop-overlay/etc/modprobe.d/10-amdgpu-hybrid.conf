# AMD Granite Ridge (RDNA2) integrated GPU on the Ryzen 9 9950X3D / ROG X870E Hero.
# Unlock the full powerplay feature mask (power/clock management); RDNA2 needs no
# other quirks. This is the secondary GPU in the hybrid setup -- the RTX 5090 is
# primary. Keeping the iGPU live gives cheap VA-API encode/decode that offloads
# video work off the dGPU so the 5090 stays free for games and LLM inference.
options amdgpu ppfeaturemask=0xffffffff
