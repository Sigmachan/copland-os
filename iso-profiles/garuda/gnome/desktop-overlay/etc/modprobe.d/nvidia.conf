# RTX 5090 (Blackwell) / nvidia-open — KMS + suspend correctness.
# modeset=1 enables DRM KMS (required for Wayland: GNOME/KDE/gamescope).
# fbdev=1 gives a proper framebuffer console on the nvidia GPU.
options nvidia_drm modeset=1 fbdev=1
# Preserve VRAM across suspend/hibernate (works with nvidia-suspend/resume.service),
# and use the page attribute table for better performance.
options nvidia NVreg_PreserveVideoMemoryAllocations=1 NVreg_UsePageAttributeTable=1
