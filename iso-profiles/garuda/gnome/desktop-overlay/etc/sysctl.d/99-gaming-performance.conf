# Gaming / desktop responsiveness tuning (Bazzite/Nobara/CachyOS-style).
# Steam/Proton (esp. DX12/vkd3d) need a very high mmap count or games crash.
vm.max_map_count = 2147483642
# Tuned for zram (compressed RAM swap): swap aggressively into fast compressed RAM,
# read single pages (no readahead) since zram is random-access.
vm.swappiness = 100
vm.page-cluster = 0
# Lower dirty ratios = smoother frame pacing under heavy I/O (game installs, shader compiles).
vm.dirty_bytes = 268435456
vm.dirty_background_bytes = 134217728
# Disable split-lock detection penalty (some games hit it hard).
kernel.split_lock_mitigate = 0
# Bigger network backlog for high-throughput downloads/streaming.
net.core.netdev_max_backlog = 4096
