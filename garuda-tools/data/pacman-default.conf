#
# /etc/pacman.conf
#
# garuda-tools build pacman.conf — CachyOS znver4 optimized base.
# Repo precedence (pacman = first-defined-wins on identical names):
#   cachyos-znver4 > cachyos-core-znver4 > cachyos-extra-znver4 > cachyos
#   > garuda (metas/branding only) > arch core/extra/multilib > chaotic-aur
# This file is version-controlled; `make install` deploys it to
# /usr/local/share/garuda-tools/pacman-default.conf so the optimization is durable.
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
Color
CheckSpace
VerbosePkgLists
ILoveCandy
ParallelDownloads = 5
DownloadUser = alpm
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional
XferCommand = /usr/bin/curl -L -C - -f -o %o %u --retry 2 --retry-delay 1 --connect-timeout 15 --speed-limit 1024 --speed-time 25

#
# REPOSITORIES
#

## blackwell-local — the user's OWN AUR/custom builds (znver5 Clang/ThinLTO via build-tools/local-repo):
## gamescope-git, proton-ge-custom-bin, apollo-cuda-git, llama.cpp-blackwell, hiddify-next-bin,
## decky-loader, google-chrome-dev, zenpower3-dkms, xone-dongle-firmware. Highest priority so the
## user's builds win over repo same-names. Populated by build-tools/local-repo/build-local-repo.sh.
[blackwell-local]
SigLevel = Never
# Optional LAN mirror (host the release on your own router/server for fast local pulls):
# Server = http://YOUR-LAN-HOST:8077
Server = https://github.com/Sigmachan/copland-os/releases/download/pkgs

## CachyOS znver4 (x86-64-v4 / AVX-512 prebuilt) — MUST precede garuda/core/extra/multilib.
## Signed by cachyos-keyring (host /etc/pacman.d/gnupg during pacstrap); inherits Required.
[cachyos-znver4]
Include = /etc/pacman.d/cachyos-v4-mirrorlist

[cachyos-core-znver4]
Include = /etc/pacman.d/cachyos-v4-mirrorlist

[cachyos-extra-znver4]
Include = /etc/pacman.d/cachyos-v4-mirrorlist

[cachyos]
SigLevel = Optional TrustAll
Include = /etc/pacman.d/cachyos-mirrorlist

## Garuda — garuda-* metas, settings, branding only (no znver4-optimizable base libs).
[garuda]
Server = https://builds.garudalinux.org/repos/$repo/$arch

## Arch
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

## Chaotic-AUR — AUR-origin prebuilt (proton-ge, vkbasalt, game-devices-udev, gamescope-session, ...)
[chaotic-aur]
Include = /etc/pacman.d/chaotic-mirrorlist
